<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel = "stylesheet" href = "quiz-rebuild.css">
</head>
<body>
    
    <div id = "welcome-screen">
        <h1>Hello, Welcome to the Quiz!</h1>


        <label>First off, what's your name?</label>
        <input type ="text" id = "username-input">

        <label>How old are you?</label>
        <input type="number" id = "age-input">

        <button onclick ="validateCredentials()">Start Quiz</button>

        <p id="welcome-error"></p>
        <p id="welcome-response"></p>
    </div>

    <div id = "topic-screen">
        <h2> Choose a topic:</h2>

        <button onclick="selectTopic('Science')">Science</button>   
        <button onclick ="selectTopic('Social Sciences')">Social Sciences</button>
    </div>

    <div id = "subtopic-screen">
        <h2>Now choose a subtopic:</h2>

        <div id ="subtopic-buttons">
        </div>
    </div>

    <div id = "quiz-screen">
        <p id="progress">Question 1 of 5</p>

        <h2 id="question-text">Question here</h2>

        <input type="text" id = "answer-input" placeholder="Type your answer">

        <button onclick = "checkAnswer()">Submit</button>

        <p id="feedback"></p>
    </div>

    <div id="results-screen">
        <h2>Quiz Complete!</h2>

        <p id="final-score">You scored X out of Y</p>

        <p id="score-message"></p>

        <button onclick = "saveScore()">Save Score</button>

        <div id="leaderboard">
            <h3>Leaderboard</h3>
            <ol id="leaderboard-list"></ol>
        </div>

        <button onclick="playAgain()">Play Again</button>

    </div>


    <script src = "quiz-rebuild.js"></script>
</body>
</html>
